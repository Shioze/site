<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>For Marina ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      height: 100vh;
      background: radial-gradient(circle at 50% 50%, #2a0845 0%, #6441A5 100%);
      font-family: 'Poppins', sans-serif;
      overflow: hidden; color: white;
    }

    .bg-bubbles {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bubble {
      position: absolute; bottom: -100px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      animation: rise 15s infinite ease-in;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-120vh) scale(2); opacity: 0; }
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 40px; border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      text-align: center; max-width: 550px; width: 90%;
      z-index: 10; transition: all 0.5s ease; position: relative;
    }

    #slideImage {
      max-width: 180px; max-height: 180px;
      object-fit: contain; margin: 0 auto 20px auto;
      display: block; border-radius: 15px;
      opacity: 0; transition: opacity 0.5s ease;
      filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.3));
    }

    h1 { 
      font-size: 1.6em; min-height: 100px; margin-bottom: 30px;
      font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.2); line-height: 1.4;
    }

    .cursor {
      display: inline-block; width: 3px; height: 1.2em;
      background-color: #ff7eb3; vertical-align: middle;
      animation: blink 0.7s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .btn-container { 
      display: flex; justify-content: center; gap: 20px; 
      position: relative; height: 60px; align-items: center; 
    }

    button {
      padding: 12px 35px; font-size: 1.1em; font-weight: 600; 
      border: none; border-radius: 50px; cursor: pointer;
      font-family: 'Poppins', sans-serif; letter-spacing: 1px; transition: 0.3s;
    }

    #nextBtn { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; width: 100%; box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
    }
    #nextBtn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(118, 75, 162, 0.6); }

    #yesBtn { 
      background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
      color: white; display: none; box-shadow: 0 4px 15px rgba(255, 8, 68, 0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); }
    }

    /* REMOVED position: absolute from here so it sits next to YES */
    #noBtn { background: #333; color: white; display: none; z-index: 100; }

    .fake-no {
      position: fixed; background: #555; color: #999;
      padding: 12px 35px; font-size: 1.1em; border-radius: 50px; 
      pointer-events: none; opacity: 0.5; z-index: 5;
      animation: fallDown 3s forwards;
    }
    @keyframes fallDown { 100% { transform: translateY(100vh) rotate(180deg); opacity: 0; } }

    /* --- MOBILE RESPONSIVE FIXES --- */
    @media (max-width: 480px) {
      .card { padding: 25px; width: 95%; }
      h1 { font-size: 1.3em; min-height: 80px; margin-bottom: 20px; }
      #slideImage { max-width: 140px; max-height: 140px; }
      button { padding: 10px 25px; font-size: 1em; }
    }
  </style>
</head>
<body>

  <div class="bg-bubbles" id="bubbles"></div>
  <div class="card" id="card">
    <img id="slideImage" src="" alt="cute image">
    <h1><span id="messageText"></span><span class="cursor"></span></h1>
    <div class="btn-container">
      <button id="nextBtn" onclick="nextPage()">Next</button>
      <button id="yesBtn" onclick="sayYes()">Yes</button>
      <button id="noBtn" onmouseover="insaneDodge(event)" ontouchstart="insaneDodge(event)">NO</button>
    </div>
  </div>

  <script>
    const bubbleContainer = document.getElementById('bubbles');
    for (let i = 0; i < 20; i++) {
      let bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.style.width = Math.random() * 80 + 20 + 'px';
      bubble.style.height = bubble.style.width;
      bubble.style.left = Math.random() * 100 + 'vw';
      bubble.style.animationDuration = Math.random() * 15 + 15 + 's';
      bubbleContainer.appendChild(bubble);
    }

    const messages = [
      "Hi Marina",
      "There's something I've wanted to tell you for quite some time.",
      "I wasn't sure how to say it...",
      "But every conversation with you always becomes the best part of my day.",
      "You make me smile without even trying.",
      "I still remember the day we hang out together...",
      "Your kindness, your laugh and the way you care about people mean a lot to me.",
      "Being around you feels comfortable and peaceful.",
      "And somewhere along the way...",
      "You became someone very special to me.",
      "And before I keep overthinking everything...",
      "But I know that I genuinely like you.",
      "So today, I just want to be honest with my heart.",
      "Marina...",
      "Would you give me a chance to be more than just a friend? ❤️"
    ];

    const imageList = [
      "asset/download.jpg", 
      "asset/PP.jpg", 
      "asset/Processing.jpg", 
      "asset/Kittyy.jpg", 
      "asset/download (3).webp", 
      "asset/download (2).jpg", 
      "asset/download (1).jpg", 
      "asset/cat.webp", 
      "asset/BASILEAF CAT.webp", 
      "asset/eaaaaaaaaa.jpg", 
      "asset/download (1).webp", 
      "asset/download.webp", 
      "asset/@MANII.jpg", 
      "asset/Cat!.jpg", 
      "asset/Flowers for youuuuu_333.webp"
    ];

    let currentPage = 0, isTyping = false, noHoverCount = 0;

    function typeWriter(text, i, cb) {
      if (i < text.length) {
        document.getElementById("messageText").innerHTML += text.charAt(i);
        setTimeout(() => typeWriter(text, i + 1, cb), 45);
      } else { cb(); }
    }

    function loadPage() {
      isTyping = true; document.getElementById('nextBtn').disabled = true;
      document.getElementById('messageText').innerHTML = '';
      const imgEl = document.getElementById('slideImage');
      imgEl.style.opacity = 0; 
      setTimeout(() => { imgEl.src = imageList[currentPage]; imgEl.style.opacity = 1; }, 300);
      typeWriter(messages[currentPage], 0, () => {
        isTyping = false; document.getElementById('nextBtn').disabled = false;
        if (currentPage === messages.length - 1) {
          document.getElementById('nextBtn').style.display = 'none';
          document.getElementById('yesBtn').style.display = 'block';
          document.getElementById('noBtn').style.display = 'block';
        }
      });
    }

    function nextPage() { if (!isTyping) { currentPage++; loadPage(); } }

    function insaneDodge(e) {
      if (e) e.preventDefault(); 
      
      const btn = document.getElementById('noBtn'); 
      noHoverCount++;

      let fakeBtn = document.createElement('div'); 
      fakeBtn.classList.add('fake-no');
      fakeBtn.innerText = "NO"; 
      fakeBtn.style.left = btn.getBoundingClientRect().left + 'px';
      fakeBtn.style.top = btn.getBoundingClientRect().top + 'px';
      document.body.appendChild(fakeBtn);
      setTimeout(() => fakeBtn.remove(), 3000);

      // It gets absolute positioning ONLY when she touches it!
      btn.style.position = 'fixed';
      
      const safeWidth = window.innerWidth - btn.offsetWidth - 20;
      const safeHeight = window.innerHeight - btn.offsetHeight - 20;
      
      btn.style.left = Math.max(10, Math.random() * safeWidth) + 'px';
      btn.style.top = Math.max(10, Math.random() * safeHeight) + 'px';
      
      const yesBtn = document.getElementById('yesBtn');
      yesBtn.style.transform = `scale(${Math.min(1 + (noHoverCount * 0.1), 2)})`;
    }

    function sayYes() {
      document.getElementById('card').innerHTML = `
        <div style="font-size: 3em; animation: heartBeat 1s infinite;">💖</div>
        <p style="margin-top: 20px; font-weight: 600;">Processing your answer...</p>
      `;
      setTimeout(() => {
        document.getElementById('card').innerHTML = `
          <img src="asset/Kittyy.jpg" style="max-width: 180px; border-radius: 15px; margin-bottom: 20px; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.3));">
          <h1 style="color: #ff7eb3; font-size: 2.2em; text-shadow: 0 0 20px rgba(255,126,179,0.8);">Thank you ❤️</h1>
          <p style="font-size: 1.1em; font-weight: 400; line-height: 1.6;">
            This is one of the happiest moments of my life.<br><br>
            I promise to cherish this moment and make many beautiful memories with you, Marina.<br><br>
            <span style="color: #ff4b82; font-weight: 600; font-size: 1.2em;">I love you. ❤️</span>
          </p>
        `;
        triggerExplosion();
      }, 2000);
    }

    function triggerExplosion() {
      for(let i = 0; i < 60; i++) {
        setTimeout(() => {
          let particle = document.createElement('div');
          particle.innerHTML = '❤️'; particle.style.position = 'absolute';
          particle.style.left = '50%'; particle.style.top = '50%';
          particle.style.fontSize = (Math.random() * 15 + 10) + 'px';
          particle.style.pointerEvents = 'none'; document.body.appendChild(particle);
          const angle = Math.random() * Math.PI * 2;
          const velocity = 50 + Math.random() * 300;
          particle.animate([
            { transform: `translate(-50%, -50%) scale(1)`, opacity: 1 },
            { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity}px) scale(0)`, opacity: 0 }
          ], { duration: 2500, easing: 'cubic-bezier(0, .9, .57, 1)', fill: 'forwards' });
          setTimeout(() => particle.remove(), 3000);
        }, i * 30);
      }
    }
    window.onload = loadPage;
  </script>
</body>
</html>
